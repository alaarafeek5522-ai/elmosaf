name: elmosaf
description: "تطبيق الموسعف - البحث عن الأدوية والأسعار"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_staggered_animations: ^1.1.1
  flutter_slidable: ^3.1.0
  
  # State & Storage
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  
  # Network
  http: ^1.2.1
  connectivity_plus: ^6.0.3
  
  # Sharing & Utils
  share_plus: ^9.0.0
  url_launcher: ^6.2.6
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
